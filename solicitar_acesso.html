<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Acesso</title>
    <link rel="stylesheet" href="css/estilos.css">
    </head>
<body>

    <main class="container-login container-solicitacao">
        
        <header class="cabecalho-login">
            <h1>Solicitar Acesso</h1>
            <p>Preencha os dados para que a administração libere seu perfil.</p>
        </header>

        <form action="index.html" method="GET" class="formulario-login">
            
            <div class="grupo-input">
                <label for="nome-funcionario">Nome Completo</label>
                <input 
                    type="text" 
                    id="nome-funcionario" 
                    name="nome" 
                    placeholder="Ex: João da Silva" 
                    required 
                >
            </div>

            <div class="grupo-input">
                <label for="email-corporativo">E-mail Corporativo</label>
                <input 
                    type="email" 
                    id="email-corporativo" 
                    name="email" 
                    placeholder="nome@empresa.com.br" 
                    required 
                >
            </div>

            <div class="grupo-input">
                <label for="setor-funcionario">Setor / Departamento</label>
                <input 
                    type="text" 
                    id="setor-funcionario" 
                    name="setor" 
                    placeholder="Ex: Recursos Humanos, TI, Financeiro" 
                    required 
                >
            </div>

            <div class="grupo-input">
                <label for="gestor-aprovador">Nome do Gestor Direto</label>
                <input 
                    type="text" 
                    id="gestor-aprovador" 
                    name="gestor" 
                    placeholder="Quem autoriza seu acesso?" 
                    required
                >
            </div>

            <button type="submit" class="btn-primario btn-alerta">Enviar Solicitação ao TI</button>

        </form>

        <footer class="rodape-login">
            <p>Já possui acesso liberado? <a href="login.html">Voltar para o Login</a></p>
        </footer>

    </main>

</body>
</html>
